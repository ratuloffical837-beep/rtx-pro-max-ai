# render.yaml — deploys two separate services from this one repo:
#   1. rtx-forex-backend  — Node/Express web service (server.js: payment/trial only)
#   2. rtx-forex-frontend — static site (Vite build output, the actual Telegram Mini App)
#
# 🔴 The backend never touches Twelve Data or market data — only the frontend
# calls Twelve Data, using each user's own key from localStorage. Every env
# var below with `sync: false` must be filled in manually in the Render
# dashboard — nothing here hardcodes real secrets.

services:
  # ---------------------------------------------------------------------
  # Backend — payment/trial API only
  # ---------------------------------------------------------------------
  - type: web
    name: rtx-forex-backend
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 18.20.0
      - key: PORT
        value: 5000
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_B64
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false

  # ---------------------------------------------------------------------
  # Frontend — the actual Telegram Mini App (static Vite build)
  # ---------------------------------------------------------------------
  - type: web
    name: rtx-forex-frontend
    runtime: static
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_DATABASE_URL
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
